<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파이프라인 — llm agent </title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/pipeline.css">
  <link rel="stylesheet" href="./css/pipeline-editor.css">
  <link rel="stylesheet" href="./css/settings.css">
</head>
<body>

<!-- 모바일 햄버거 메뉴 버튼 -->
<button class="hamburger" id="hamburger-btn" aria-label="메뉴 열기">☰</button>

<!-- 사이드바 (app.js가 동적 생성) -->
<aside class="sidebar" id="sidebar" role="navigation" aria-label="주 내비게이션"></aside>

<!-- 메인 콘텐츠 -->
<main class="main" role="main">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">마케팅 <span>파이프라인</span></h1>
      <p class="page-subtitle">프로젝트 요청과 브랜드 가이드라인을 입력하면 전략서·카피·비주얼 브리프·콘텐츠 계획을 자동 생성합니다</p>
    </div>
    <div class="header-actions">
      <a href="#" class="btn btn-ghost">← 프로젝트</a>
      <button class="btn btn-primary" id="run-btn-header" aria-label="전체 파이프라인 실행">
        ▶ 전체 실행
      </button>
    </div>
  </div>

  <!-- 파이프라인 2열 레이아웃 -->
  <div class="pipeline-layout">

    <!-- 좌측: 파이프라인 설정 -->
    <div>
      <!-- 컨텍스트 누적 알림 배너 -->
      <div class="context-notice" role="status" aria-live="polite">
        <span class="context-icon" aria-hidden="true">🔗</span>
        <span class="context-text">컨텍스트 누적 중 — 1차 실행 결과물이 다음 실행에 자동 포함됩니다</span>
      </div>

      <!-- AI 연결 상태 배너 (설정 페이지로 이동) -->
      <div class="api-status-banner">
        <span id="api-status-indicator">○ 연결 안됨 (목업 모드)</span>
        <a href="./pages/settings.html">AI 연결 설정 →</a>
      </div>


      <!-- 프로젝트 요청 입력 카드 -->
      <div class="card user-input-card">
        <div class="card-header">
          <div>
            <div class="card-title">프로젝트 요청</div>
            <div class="card-subtitle">{{user_input}} 변수로 에이전트 프롬프트에서 참조됩니다</div>
          </div>
          <button class="btn btn-ghost btn-sm" id="load-sample-btn" aria-label="샘플 데이터 불러오기">
            샘플 데이터
          </button>
        </div>
        <textarea id="user-input-area" class="user-input-textarea"
          placeholder="마케팅 프로젝트 요청을 입력하세요...&#10;예) 해남 꿀고구마 스마트스토어 론칭 캠페인. 30~40대 주부 타겟, 봄 시즌 SNS 광고 집행 예정."
          rows="3" aria-label="프로젝트 요청 입력"></textarea>
      </div>

      <!-- 클라이언트 브랜드 가이드라인 카드 -->
      <div class="card brand-info-card">
        <div class="card-header">
          <div>
            <div class="card-title">클라이언트 정보 <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);font-weight:400">— 브랜드 가이드라인</span></div>
            <div class="card-subtitle">{{brand_info}} 변수로 모든 에이전트 프롬프트에서 참조됩니다</div>
          </div>
        </div>
        <div id="brand-info-body" class="brand-info-body">
          <div class="brand-info-grid">
            <div class="brand-field">
              <label class="brand-label" for="brand-name">브랜드명</label>
              <input type="text" id="brand-name" class="brand-input"
                placeholder="예) 해남 꿀고구마" aria-label="브랜드명 입력" />
            </div>
            <div class="brand-field">
              <label class="brand-label" for="brand-slogan">슬로건 / 태그라인</label>
              <input type="text" id="brand-slogan" class="brand-input"
                placeholder="예) 해남에서 온 달콤한 선물" aria-label="슬로건 입력" />
            </div>
            <div class="brand-field">
              <label class="brand-label" for="brand-colors">브랜드 컬러</label>
              <input type="text" id="brand-colors" class="brand-input"
                placeholder="예) 브라운(#8B4513), 크림(#FFF8F0)" aria-label="브랜드 컬러 입력" />
            </div>
            <div class="brand-field">
              <label class="brand-label" for="brand-tone">톤앤매너</label>
              <input type="text" id="brand-tone" class="brand-input"
                placeholder="예) 따뜻함, 신뢰, 자연, 가족 친화적" aria-label="톤앤매너 입력" />
            </div>
            <div class="brand-field">
              <label class="brand-label" for="brand-target">타겟 고객</label>
              <input type="text" id="brand-target" class="brand-input"
                placeholder="예) 30~40대 건강에 관심 있는 주부" aria-label="타겟 고객 입력" />
            </div>
            <div class="brand-field">
              <label class="brand-label" for="brand-competitors">경쟁사</label>
              <input type="text" id="brand-competitors" class="brand-input"
                placeholder="예) 대형마트 농산물 코너, 타 스마트스토어 고구마" aria-label="경쟁사 입력" />
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 우측: 실행 패널 -->
    <div class="run-panel">

      <!-- 실행 히스토리 카드 -->
      <div class="run-history-card">
        <div class="run-history-header">
          <!-- 실행 탭 (pipeline.js가 동적 생성) -->
          <div class="run-tabs" id="run-tabs" role="tablist" aria-label="실행 기록 탭">
          </div>
          <div class="run-status" aria-live="polite">
            <div class="status-dot" id="run-status-dot" aria-hidden="true"></div>
            <span id="run-status-label" style="font-family:var(--font-mono);font-size:10px;">대기</span>
          </div>
        </div>

        <!-- 결과 리스트 (pipeline.js가 동적 생성) -->
        <div class="run-result-list" id="run-result-list" role="list" aria-label="에이전트 실행 결과">
        </div>

        <!-- 토큰 사용량 바 -->
        <div class="token-section">
          <div class="token-section-label">토큰 사용량</div>
          <div class="token-bar-wrap" id="token-bar-wrap" aria-label="에이전트별 토큰 사용량">
          </div>
        </div>
      </div>

    </div>
  </div>

</main>

<!-- 의존성 순서: store → app → pipeline -->
<script src="./js/store.js"></script>
<script src="./js/app.js"></script>
<script src="./js/pipeline.js"></script>

</body>
</html>
